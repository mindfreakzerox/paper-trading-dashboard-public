name: Build (no image push)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci || true
      - name: Build
        run: npm run build || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: ./dist || ./build || .
