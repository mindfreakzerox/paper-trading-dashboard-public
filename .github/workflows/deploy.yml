name: Build and Publish
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci || true
      - name: Build
        run: npm run build || true
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GITHUB_ACTOR }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/paper-trading-dashboard-public:${{ github.sha }}
          docker build -t $IMAGE .
          docker tag $IMAGE ghcr.io/${{ github.repository_owner }}/paper-trading-dashboard-public:latest
          docker push $IMAGE
          docker push ghcr.io/${{ github.repository_owner }}/paper-trading-dashboard-public:latest
