<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max-Return Config — 2026 BTC Trades</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #0b0f14; color: #e6edf3; }
    .wrap { max-width: 1280px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .muted { color: #9fb0c3; margin-bottom: 16px; }
    .card { background: #121821; border: 1px solid #223041; border-radius: 10px; padding: 12px; margin-bottom: 14px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 10px; }
    .stat { background: #0f141c; border: 1px solid #223041; border-radius: 8px; padding: 10px; }
    .k { font-size: 12px; color: #9fb0c3; }
    .v { font-size: 18px; font-weight: 700; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #1d2a3a; padding: 8px; text-align: left; }
    th { position: sticky; top: 0; background: #121821; z-index: 1; }
    .sell { color: #ff7676; }
    .buy { color: #4ade80; }
    .pnl-pos { color: #4ade80; }
    .pnl-neg { color: #ff7676; }
    .table-wrap { max-height: 70vh; overflow: auto; border: 1px solid #223041; border-radius: 10px; }
    .err { color: #ff7676; }
    a { color: #7dd3fc; }
    code { background: #0f141c; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Max-Return Config — 2026 BTC Trade Log</h1>
    <div class="muted">Source: <code>/data/max_return_best_trades_2026_0p1btc.csv</code></div>

    <div class="card stats" id="stats"></div>

    <div class="card table-wrap">
      <table id="tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Timestamp (UTC)</th>
            <th>Side</th>
            <th>Price</th>
            <th>Qty</th>
            <th>PnL</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="muted">CSV: <a href="/data/max_return_best_trades_2026_0p1btc.csv" target="_blank">open raw</a></div>
  </div>

  <script>
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const header = lines.shift().split(',');
      return lines.map(line => {
        const cells = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
            else inQ = !inQ;
          } else if (ch === ',' && !inQ) {
            cells.push(cur); cur = '';
          } else cur += ch;
        }
        cells.push(cur);
        const obj = {};
        header.forEach((h, i) => obj[h] = (cells[i] ?? '').trim());
        return obj;
      });
    }

    function fmt(n) { return Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    async function main() {
      const statsEl = document.getElementById('stats');
      const tbody = document.querySelector('#tbl tbody');
      try {
        const res = await fetch('/data/max_return_best_trades_2026_0p1btc.csv', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const txt = await res.text();
        const rows = parseCSV(txt);

        let sells = 0, buys = 0, pnl = 0;
        for (const r of rows) {
          if (r.side === 'BUY') buys++;
          if (r.side === 'SELL') { sells++; pnl += Number(r.pnl || 0); }
        }
        const wins = rows.filter(r => r.side === 'SELL' && Number(r.pnl || 0) > 0).length;
        const wr = sells ? (wins / sells * 100) : 0;

        statsEl.innerHTML = `
          <div class="stat"><div class="k">Total Actions</div><div class="v">${rows.length}</div></div>
          <div class="stat"><div class="k">Round-trips</div><div class="v">${sells}</div></div>
          <div class="stat"><div class="k">BUY Actions</div><div class="v">${buys}</div></div>
          <div class="stat"><div class="k">Realized PnL</div><div class="v ${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">$${fmt(pnl)}</div></div>
          <div class="stat"><div class="k">Win Rate</div><div class="v">${wr.toFixed(1)}%</div></div>
        `;

        rows.forEach((r, i) => {
          const tr = document.createElement('tr');
          const sideClass = r.side === 'BUY' ? 'buy' : 'sell';
          const pnlNum = Number(r.pnl || 0);
          const pnlClass = pnlNum > 0 ? 'pnl-pos' : (pnlNum < 0 ? 'pnl-neg' : '');
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${r.ts}</td>
            <td class="${sideClass}">${r.side}</td>
            <td>${r.price}</td>
            <td>${r.qty}</td>
            <td class="${pnlClass}">${r.pnl || ''}</td>
            <td>${r.reason}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        statsEl.innerHTML = `<div class="err">Failed to load CSV: ${e.message}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
